# GitHub Actions workflow for Dependabot PRs
# This workflow runs additional checks on Dependabot pull requests
# and can auto-merge safe dependency updates

name: Dependabot

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: dependabot-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      package-ecosystem: ${{ steps.metadata.outputs.package-ecosystem }}
      dependency-type: ${{ steps.metadata.outputs.dependency-type }}
      update-type: ${{ steps.metadata.outputs.update-type }}
      dependency-name: ${{ steps.metadata.outputs.dependency-name }}
      old-version: ${{ steps.metadata.outputs.old-version }}
      new-version: ${{ steps.metadata.outputs.new-version }}
      release-notes: ${{ steps.metadata.outputs.release-notes }}
      changelog: ${{ steps.metadata.outputs.changelog }}
      commits: ${{ steps.metadata.outputs.commits }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

  validate:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: metadata
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests
        run: |
          uv run pytest -m "not failing" --maxfail=1 --disable-warnings -q --cov=claude_builder --cov-report=xml:coverage.xml

      - name: Run security checks
        run: |
          uv run bandit -r src/ -lll -iii -f json -o bandit-report.json

      - name: Run linting
        run: |
          uv run ruff check src/ tests/
          uv run mypy src/ --ignore-missing-imports

      - name: Summarize update details
        run: |
          {
            echo "## Dependabot update summary"
            echo "- Package ecosystem: ${{ needs.metadata.outputs.package-ecosystem }}"
            echo "- Dependency type: ${{ needs.metadata.outputs.dependency-type }}"
            echo "- Update type: ${{ needs.metadata.outputs.update-type }}"
            echo "- Dependency: ${{ needs.metadata.outputs.dependency-name }}"
            echo "- Validation: required tests, lint, typing, and bandit checks ran without best-effort bypasses."
            echo "- Note: legacy safety scan invocation was removed from this workflow."
            echo ""
            echo "Manual review is still recommended before merging."
          } >> "$GITHUB_STEP_SUMMARY"

  annotate:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    needs: metadata
    permissions:
      contents: read
      issues: write
    steps:
      - name: Add labels based on update type
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const labels = ['dependabot'];
            const ecosystem = '${{ needs.metadata.outputs.package-ecosystem }}';
            const updateType = '${{ needs.metadata.outputs.update-type }}';
            const dependencyType = '${{ needs.metadata.outputs.dependency-type }}';

            // Add ecosystem-specific labels
            if (ecosystem === 'pip') {
              labels.push('python');
            } else if (ecosystem === 'github-actions') {
              labels.push('ci');
            }

            // Add update type labels
            if (updateType.includes('major')) {
              labels.push('major-update', 'needs-review');
            } else if (updateType.includes('minor')) {
              labels.push('minor-update');
            } else if (updateType.includes('patch')) {
              labels.push('patch-update');
            }

            // Add dependency type labels
            if (dependencyType === 'development') {
              labels.push('dev-deps');
            } else {
              labels.push('runtime-deps');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

      - name: Comment on major updates
        if: contains(needs.metadata.outputs.update-type, 'major')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 **Major Version Update Detected**

              This PR updates \`${{ needs.metadata.outputs.dependency-name }}\` from \`${{ needs.metadata.outputs.old-version }}\` to \`${{ needs.metadata.outputs.new-version }}\`.

              **⚠️ Manual review recommended:**
              - Check for breaking changes in the release notes
              - Verify compatibility with your codebase
              - Test thoroughly before merging

              **Useful links:**
              - [Release notes](${{ needs.metadata.outputs.release-notes }})
              - [Changelog](${{ needs.metadata.outputs.changelog }})
              - [Commit history](${{ needs.metadata.outputs.commits }})
              `
            });
