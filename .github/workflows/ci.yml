name: CI
# Hotfix: validate YAML structure and remove accidental separators (2025-09-19)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  release:
    types: [ published ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Required - test matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        # Ensure we have access to compare commits for coverage
        ref: ${{ github.head_ref || github.ref }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Lint with ruff
      run: |
        # Block only on correctness-critical rules until legacy style debt is reduced.
        uv run ruff check src/claude_builder --select E9,F63,F7,F82

    - name: Format check with ruff format
      run: |
        if [ -n "${GITHUB_EVENT_BEFORE:-}" ] && git cat-file -e "${GITHUB_EVENT_BEFORE}^{commit}" 2>/dev/null; then
          RANGE="${GITHUB_EVENT_BEFORE}..${GITHUB_SHA}"
        elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          RANGE="HEAD~1..HEAD"
        else
          RANGE="HEAD"
        fi
        mapfile -t changed_py < <(git diff --name-only --diff-filter=ACMR "$RANGE" -- '*.py')
        if [ "${#changed_py[@]}" -eq 0 ]; then
          echo "No changed Python files detected; skipping format check."
          exit 0
        fi
        uv run ruff format --check "${changed_py[@]}"

    - name: Type check with mypy
      run: |
        uv run mypy src/claude_builder --ignore-missing-imports

    - name: Security check with bandit
      run: |
        # Gate on high-severity/high-confidence findings.
        uv run bandit -r src/claude_builder -lll -iii -f json -o bandit-report.json

    - name: Run tests with coverage (excluding failing)
      run: |
        uv run pytest -m "not failing" --cov=claude_builder --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-report=term-missing --junitxml=junit.xml -v

    - name: Summarize coverage for required path
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' }}
      run: |
        if [ ! -f coverage.xml ]; then
          echo "coverage.xml missing after pytest" >&2
          exit 1
        fi
        echo "## Required test coverage" >> "$GITHUB_STEP_SUMMARY"
        uv run coverage report >> "$GITHUB_STEP_SUMMARY"

    - name: Upload test results and coverage artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          .coverage
          junit.xml
          coverage.xml
          htmlcov/
          bandit-report.json
        if-no-files-found: ignore

  code-quality:
    name: Informational - external analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Check Codacy token availability
      run: |
        if [ -z "${{ secrets.CODACY_PROJECT_TOKEN }}" ]; then
          echo "⚠️  CODACY_PROJECT_TOKEN is not set - Codacy analysis will be skipped"
        else
          echo "✅ CODACY_PROJECT_TOKEN is configured"
        fi

    - name: Codacy Analysis (ruff)
      if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
      continue-on-error: true
      uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        upload: true
        max-allowed-issues: 2147483647
        tool: "ruff"
        directory: "${{ github.workspace }}/src"

    - name: Codacy Analysis (pylint)
      if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
      continue-on-error: true
      uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        upload: true
        max-allowed-issues: 2147483647
        tool: "pylint"
        directory: "${{ github.workspace }}/src"

    - name: Codacy Analysis (bandit)
      if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
      continue-on-error: true
      uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        upload: true
        max-allowed-issues: 2147483647
        tool: "bandit"
        directory: "${{ github.workspace }}/src"

    - name: Codacy Analysis (semgrep)
      if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
      continue-on-error: true
      uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        upload: true
        max-allowed-issues: 2147483647
        tool: "semgrep"
        directory: "${{ github.workspace }}/src"

    - name: Lint markdown files
      uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23
      with:
        globs: |
          **/*.md
          !.venv/**
          !node_modules/**
          !src/claude_builder/templates/**
        config: .markdownlint-cli2.jsonc

  security:
    name: Required - security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install security tooling
        run: |
          uv pip install --system detect-secrets bandit
      - name: Verify secrets baseline
        run: detect-secrets scan --baseline .secrets.baseline --all-files --exclude-files 'src/claude_builder/templates/*'
      - name: Bandit (security scan)
        run: |
          bandit -r src/claude_builder -lll -iii -f json -o bandit-report.json
      - name: Upload security artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-artifacts
          path: |
            bandit-report.json
          if-no-files-found: ignore

  performance:
    name: Informational - performance smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install project (dev)
        run: |
          uv pip install --system -e ".[dev]"
      - name: Run performance smoke tests (if present)
        env:
          PYTHONPATH: src
        run: |
          if [ -d tests/performance ]; then
            uv run pytest tests/performance -q || true
          else
            echo "No tests/performance directory; skipping."
          fi

  test-failing:
    name: Informational - quarantined failing tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run failing tests (non-blocking)
        run: |
          uv run pytest -m "failing" --cov=claude_builder --cov-report=xml:coverage-failing.xml --cov-report=html:htmlcov-failing --junitxml=junit-failing.xml -v || true

      - name: Upload failing test artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: failing-test-results
          path: |
            junit-failing.xml
            coverage-failing.xml
            htmlcov-failing/
          if-no-files-found: ignore

  coverage-metrics:
    name: Informational - coverage reporting
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [test]
    if: always()
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Download test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Show downloaded contents
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f -print

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Ensure coverage.xml from raw data
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install 'coverage[toml]>=7.0.0'
          if [ ! -f coverage.xml ] && [ -f .coverage ]; then
            echo "Generating coverage.xml from .coverage"
            coverage xml -o coverage.xml || true
          fi
          ls -la coverage.xml || echo "coverage.xml still missing"

      - name: Compute coverage percent
        id: cov_post
        run: |
          if [ -f coverage.xml ]; then
            RATE=$(grep -o 'line-rate="[^"]*"' coverage.xml | head -1 | sed 's/[^0-9\.]//g' || true)
            if [ -z "$RATE" ]; then PCT=0; else PCT=$(awk -v r="$RATE" 'BEGIN{printf "%.2f", r*100}'); fi
          else
            PCT=0
          fi
          echo "percent=$PCT" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codacy (only if tests failed)
        if: ${{ needs.test.result != 'success' && hashFiles('coverage.xml') != '' && env.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
          force-coverage-parser: cobertura
        env:
          CODACY_API_BASE_URL: https://api.codacy.com

      - name: Upload coverage to Codecov (only if tests failed)
        if: ${{ needs.test.result != 'success' && hashFiles('coverage.xml') != '' && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-post-failure
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}

      - name: Append coverage status to summary
        run: |
          {
            echo ""
            echo "### Coverage Metrics (post-test)"
            echo "Test job result: ${{ needs.test.result }}"
            echo "Coverage percent: ${{ steps.cov_post.outputs.percent }}%"
            if [ -f coverage.xml ]; then echo "coverage.xml present ✅"; else echo "coverage.xml missing ⚠️"; fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage-metrics artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-metrics
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  integration-tests:
    name: Required - integration tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install project (dev)
        run: |
          uv pip install --system -e ".[dev]"
      - name: Run integration tests
        env:
          PYTHONPATH: src
        run: |
          if [ -d tests/integration ]; then
            uv run pytest tests/integration -q -o addopts='' -m "not failing and not performance and not slow and not requires_network and not requires_git"
          else
            echo "No integration tests found; skipping."
          fi

  build:
    name: Required - build artifacts
    runs-on: ubuntu-latest
    needs: [test, integration-tests]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: |
          uvx --from build pyproject-build
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  notify:
    runs-on: ubuntu-latest
    needs: [test, code-quality, security, performance, integration-tests, build]
    if: ${{ always() }}
    steps:
      - name: Summary
        run: |
          echo "CI completed. Check artifacts and job results above." >> "$GITHUB_STEP_SUMMARY"

  workflows-lint:
    name: Informational - workflow lint
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Lint GitHub workflows with actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
